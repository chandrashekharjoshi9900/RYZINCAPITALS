<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Premium Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <!-- Add Logo Here -->
                <img src="logo.png" alt="Logo" class="mb-3" style="height: 85px; width: auto; object-fit: contain;">
                <h1 class="auth-title">Create Account</h1>
                <p class="text-muted small">Start your investment journey with RAYZIN CAPITALS</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter full name" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a unique username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="mobile" class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" id="mobile" placeholder="e.g. +91 9876543210" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
                </div>

                <div class="mb-4">
                    <label for="referralCode" class="form-label">Referral Code (Optional)</label>
                    <input type="text" class="form-control" id="referralCode" placeholder="Enter referral code">
                </div>

                <button type="submit" class="btn btn-premium mb-3" id="btnSubmit">Register Now</button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-0">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Congratulations Welcome Modal (Premium Dark/Green styling) -->
    <div class="modal fade" id="welcomeModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="welcomeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--bg-secondary); border: 1px solid var(--accent-green); border-radius: 16px;">
                <div class="modal-body text-center p-5">
                    <div class="mb-4">
                        <i class="fa-solid fa-circle-check text-highlight" style="font-size: 72px;"></i>
                    </div>
                    <h2 class="fw-bold text-white mb-2" id="welcomeModalLabel">Congratulations!</h2>
                    <p class="text-white mb-4" style="opacity: 0.85;">Your account has been successfully created.<br>Welcome to <strong>RAYZIN CAPITALS</strong>!</p>
                    <button type="button" class="btn btn-premium w-100 py-3" id="btnModalRedirect">
                        Go to Dashboard <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase System Logic Script connection -->
    <script type="module" src="js/register.js"></script>
</body>
</html>
