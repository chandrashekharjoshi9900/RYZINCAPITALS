<!-- forgot-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Premium Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h1 class="auth-title">Reset Password</h1>
                <p class="text-muted small">We'll email you instructions to reset your password</p>
            </div>

            <form id="forgotForm">
                <div class="mb-4">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>

                <button type="submit" class="btn btn-premium mb-3" id="btnReset">Send Reset Link</button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-0">Remembered credentials? <a href="login.html">Return to Login</a></p>
            </div>
        </div>
    </div>

    <!-- Forgot Logic Connection -->
    <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
