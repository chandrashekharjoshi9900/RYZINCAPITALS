<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Premium Platform</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header / Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="dashboard.html">
                <i class="fa-solid fa-chart-line text-info"></i> RAYZIN CAPITALS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link-custom" href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="packages.html"><i class="fa-solid fa-cubes"></i> Packages</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="wallet.html"><i class="fa-solid fa-wallet"></i> Wallet</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="deposit.html"><i class="fa-solid fa-arrow-down"></i> Deposit</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="withdraw.html"><i class="fa-solid fa-arrow-up"></i> Withdraw</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="referral.html"><i class="fa-solid fa-users"></i> Referrals</a></li>
                    <li class="nav-item"><a class="nav-link-custom" href="transactions.html"><i class="fa-solid fa-list-check"></i> Ledger</a></li>
                    <li class="nav-item"><a class="nav-link-custom active" href="profile.html"><i class="fa-solid fa-user-gear"></i> Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">
            
            <!-- Left Side: Static Metadata Info -->
            <div class="col-lg-4">
                <div class="p-4 rounded-4 text-center border border-secondary h-100" style="background: var(--bg-secondary);">
                    
                    <!-- Clean Static Avatar Icon -->
                    <div class="mb-4">
                        <i class="fa-solid fa-user-shield text-info" style="font-size: 80px;"></i>
                    </div>
                    
                    <h5 class="text-white fw-bold mb-1" id="lblFullName">Loading Name...</h5>
                    <p class="text-muted small mb-4" id="lblEmail">user@example.com</p>

                    <!-- Immutable Credentials Block -->
                    <div class="text-start bg-dark p-3 rounded border border-secondary">
                        <div class="mb-2">
                            <span class="text-muted small d-block">User ID (Permanent):</span>
                            <strong class="text-white font-monospace small" id="lblUserId">---</strong>
                        </div>
                        <div class="mb-2">
                            <span class="text-muted small d-block">Username:</span>
                            <strong class="text-white font-monospace small" id="lblUsername">---</strong>
                        </div>
                        <div>
                            <span class="text-muted small d-block">My Referral Code:</span>
                            <strong class="text-info font-monospace small" id="lblReferralCode">---</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Edit Form & Password Switch -->
            <div class="col-lg-8">
                <!-- Box 1: Profile Editor Form -->
                <div class="p-4 rounded-4 border border-secondary mb-4" style="background: var(--bg-secondary);">
                    <h5 class="text-white fw-bold mb-3"><i class="fa-solid fa-user-pen text-info me-2"></i>Edit Profile Details</h5>
                    <form id="profileForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="inputFullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="inputFullName" required>
                            </div>
                            <div class="col-md-6">
                                <label for="inputMobile" class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="inputMobile" required>
                            </div>
                            <div class="col-12">
                                <label for="inputWalletAddress" class="form-label">Default Receiver Wallet Address (USDT / BTC)</label>
                                <input type="text" class="form-control" id="inputWalletAddress" placeholder="Paste your default payout address">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-premium mt-4 w-auto px-4" id="btnUpdateProfile">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Save Profile Details
                        </button>
                    </form>
                </div>

                <!-- Box 2: Change Password -->
                <div class="p-4 rounded-4 border border-secondary" style="background: var(--bg-secondary);">
                    <h5 class="text-white fw-bold mb-3"><i class="fa-solid fa-key text-info me-2"></i>Change Security Password</h5>
                    <form id="passwordForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" placeholder="Min. 6 characters" required>
                            </div>
                            <div class="col-md-6">
                                <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-outline-info border-secondary mt-4 w-auto px-4" id="btnUpdatePassword">
                            <i class="fa-solid fa-shield-halved me-1"></i> Update Password
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Logic Script Module -->
    <script type="module" src="js/profile.js"></script>
</body>
</html>
